# Remap prefix to Ctrl+A

unbind C-b

set-option -g prefix C-a

bind-key C-a send-prefix



# Other binds

bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'



# Design



## Sound

set -g visual-activity off

set -g visual-bell off

set -g visual-silence off

setw -g monitor-activity off

set -g bell-action none



## Modes

setw -g clock-mode-colour colour5



## Panes

set -g pane-border-style 'fg=colour1 bg=colour0'

set -g pane-active-border-style 'fg=colour9 bg=colour0'



## Statusbar

set -g status-position bottom

set -g status-justify left

set -g status-left ''

set -g status-right '#[fg=colour3,bg=colour0] %d/%m #[fg=colour0,bg=colour3] %H:%M:%S '

set -g status-right-length 50

set -g status-left-length 20



set -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '

set-option -g allow-rename off

set -g window-status-format '#I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'seebi/tmux-colors-solarized'

set -g @colors-solarized '256'
#set -g @colors-solarized 'dark'
#set -g @colors-solarized 'light'
#set -g @colors-solarized 'base16'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
